<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup System</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="auth-container">
        <div class="welcome-section" id="welcome-section">
            <h1>Welcome!</h1>
            <p>Join our platform to access all features</p>
            <button class="toggle-btn" id="welcome-btn">Sign Up</button>
        </div>

        <div class="form-section">
            <div class="form-container" id="login-form">
                <h2>Login</h2>
                <p>Please enter your credentials</p>

                <form id="form2">
                    <div class="form-group">
                        <label for="email2">Email</label>
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email2" name="email2" required>
                        <div class="error-message" id="email2-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="passwordd">Password</label>
                        <i class="fas fa-lock"></i>
                        <input type="password" id="passwordd" name="passwordd" required>
                        <i class="fas fa-eye password-toggle" id="toggle-passwordd"></i>
                        <div class="error-message" id="passwordd-error"></div>
                    </div>

                    <div class="remember-forgot">
                        <div class="remember-me">
                            <input type="checkbox" id="remeberMe" name="remeberMe">
                            <label for="remeberMe">Remember me</label>
                        </div>
                        <a href="#" id="forgot-password">Forgot password?</a>
                    </div>

                    <button type="submit" class="submit-btn">Login</button>

                    <div class="switch-form">
                        Don't have an account? <a href="#" id="show-signup">Sign Up</a>
                    </div>
                </form>
            </div>

            <div class="form-container" id="signup-form" style="display: none;">
                <h2>Create Account</h2>
                <p>Register to get started</p>

                <form id="form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" name="username" required>
                        <div class="error-message" id="username-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" required>
                        <div class="error-message" id="email-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" required>
                        <i class="fas fa-eye password-toggle" id="toggle-password"></i>
                        <div class="error-message" id="password-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="password2">Confirm Password</label>
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password2" name="password2" required>
                        <i class="fas fa-eye password-toggle" id="toggle-password2"></i>
                        <div class="error-message" id="password2-error"></div>
                    </div>

                    <button type="submit" class="submit-btn">Register</button>

                    <div class="switch-form">
                        Already have an account? <a href="#" id="show-login">Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="index.js"></script>
</body>

</html>
